<!-- _includes/gallery.html -->
{% assign gallery_images = "images/gallery/team-01.jpg,images/gallery/team-08.jpg,images/gallery/team-09.jpg,images/gallery/team-10.jpg,images/gallery/team-11.jpg,images/gallery/team-12.jpg" | split: "," %}

<div class="gallery-container">
  <div class="gallery">
    {% for image in gallery_images limit: 3 %}
      <div class="gallery-item">
        <img
          src="{{ image | relative_url }}"
          alt="PhoQuS group photo"
          class="gallery-img"
          loading="lazy"
          decoding="async"
        >
      </div>
    {% endfor %}
  </div>
</div>

<style>
  .gallery-container {
    width: 100%;
    margin: 0 auto;
    overflow: hidden;
  }
  .gallery {
    display: flex;
    justify-content: space-between;
    gap: 20px;
  }
  .gallery-item {
    flex: 1;
    max-width: 33.33%;
    transition: opacity 1s ease-in-out;
  }
  .gallery-img {
    width: 100%;
    height: auto;
    object-fit: contain;
    border-radius: 8px;
  }
  .gallery-item.fade {
    opacity: 0;
  }
</style>

<script>
  {
    const galleryImages = [
      {% for image in gallery_images %}
        "{{ image | relative_url }}",
      {% endfor %}
    ];

    let currentIndex = 3;
    const galleryItems = document.querySelectorAll(".gallery-item");

    function updateGallery() {
      galleryItems.forEach((item, i) => {
        item.classList.add("fade");
        setTimeout(() => {
          const imgIndex = (currentIndex + i) % galleryImages.length;
          const img = item.querySelector("img");
          img.src = galleryImages[imgIndex];
          item.classList.remove("fade");
        }, 500);
      });

      currentIndex = (currentIndex + galleryItems.length) % galleryImages.length;
    }

    setInterval(updateGallery, 5000);
  }
</script>
